<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sistema de Biblioteca - Login</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-body">
<div class="login-card">
  <div class="login-icon-wrap">
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
      <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
    </svg>
  </div>
  <h1>Sistema de Biblioteca</h1>
  <p class="subtitle">Informe as suas credenciais para acessar ao sistema</p>

  <div th:if="${param.error}" class="alert-error">Email ou senha incorretos. Tente novamente.</div>
  <div th:if="${param.logout}" class="alert-success">Sessao encerrada com sucesso.</div>

  <form th:action="@{/login}" method="post">
    <div class="form-group">
      <label for="username">Email</label>
      <input id="username" type="text" name="username" placeholder="seuemail@gmail.com" required autofocus>
    </div>
    <div class="form-group">
      <label for="password">Senha</label>
      <input id="password" type="password" name="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" required>
    </div>
    <button type="submit" class="btn-primary btn-full">Enviar</button>
  </form>

  <p class="hint">Dica: Use a senha <strong>admin123</strong></p>
</div>
</body>
</html>
