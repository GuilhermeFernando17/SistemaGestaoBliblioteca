<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Usuários - Sistema de Biblioteca</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="layout">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <main class="main-content">
    <div class="page-header">
      <div>
        <h1>Gerenciamento de Usuário</h1>
        <p>Gerenciamento de Usuário</p>
      </div>
      <button class="btn-primary" onclick="openModal('createUsuarioModal')">+ Novo Usuário</button>
    </div>

    <form class="search-form" th:action="@{/usuarios}" method="get">
      <span class="search-icon">&#128269;</span>
      <input type="text" name="busca" th:value="${busca}" placeholder="Buscar por nome ou email..."/>
      <button type="submit">Buscar</button>
    </form>

    <div class="card">
      <h2 class="card-title">Usuários Cadastrados (<span th:text="${usuarios.size()}">0</span>)</h2>
      <table>
        <thead>
          <tr>
            <th>Nome</th><th>Email</th><th>Telefone</th><th>Status</th><th>Ações</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="u : ${usuarios}">
            <td th:text="${u.nome}"></td>
            <td th:text="${u.email}"></td>
            <td th:text="${u.telefone}"></td>
            <td>
              <span class="status-badge"
                th:classappend="${u.status == 'Ativo' ? 'st-ativo' : 'st-inativo'}"
                th:text="${u.status}"></span>
            </td>
            <td class="actions-cell">
              <button class="btn-sm btn-edit"
                th:data-id="${u.id}"
                th:data-nome="${u.nome}"
                th:data-email="${u.email}"
                th:data-telefone="${u.telefone}"
                th:data-status="${u.status}">Editar</button>
              <form th:action="@{/usuarios/{id}/deletar(id=${u.id})}" method="post"
                    onsubmit="return confirm('Excluir este usuário?')">
                <button type="submit" class="btn-sm btn-delete">Excluir</button>
              </form>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(usuarios)}">
            <td colspan="5" class="empty-row">Nenhum usuário encontrado.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- CREATE MODAL -->
<div id="createUsuarioModal" class="modal-backdrop">
  <div class="modal-box">
    <div class="modal-head">
      <h3>Novo Usuário</h3>
      <button class="modal-close-btn" onclick="closeModal('createUsuarioModal')">&#215;</button>
    </div>
    <div class="modal-body">
      <form th:action="@{/usuarios}" method="post">
        <div class="form-group">
          <label>Nome</label>
          <input type="text" name="nome" required placeholder="Nome completo"/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" required placeholder="email@exemplo.com"/>
        </div>
        <div class="form-group">
          <label>Telefone</label>
          <input type="text" name="telefone" placeholder="+5511999999999"/>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select name="status">
            <option value="Ativo">Ativo</option>
            <option value="Inativo">Inativo</option>
          </select>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-secondary" onclick="closeModal('createUsuarioModal')">Cancelar</button>
          <button type="submit" class="btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div id="editUsuarioModal" class="modal-backdrop">
  <div class="modal-box">
    <div class="modal-head">
      <h3>Editar Usuário</h3>
      <button class="modal-close-btn" onclick="closeModal('editUsuarioModal')">&#215;</button>
    </div>
    <div class="modal-body">
      <form id="editUsuarioForm" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="form-group">
          <label>Nome</label>
          <input type="text" id="editNome" name="nome" required/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="editEmail" name="email" required/>
        </div>
        <div class="form-group">
          <label>Telefone</label>
          <input type="text" id="editTelefone" name="telefone"/>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="editStatus" name="status">
            <option value="Ativo">Ativo</option>
            <option value="Inativo">Inativo</option>
          </select>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-secondary" onclick="closeModal('editUsuarioModal')">Cancelar</button>
          <button type="submit" class="btn-primary">Atualizar</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.btn-edit').forEach(function(btn){
  btn.addEventListener('click', function(){
    document.getElementById('editNome').value = this.dataset.nome;
    document.getElementById('editEmail').value = this.dataset.email;
    document.getElementById('editTelefone').value = this.dataset.telefone;
    document.getElementById('editStatus').value = this.dataset.status;
    document.getElementById('editUsuarioForm').action = '/usuarios/' + this.dataset.id + '/editar';
    openModal('editUsuarioModal');
  });
});

document.querySelectorAll('.modal-backdrop').forEach(function(bd){
  bd.addEventListener('click', function(e){ if(e.target===this) closeModal(this.id); });
});
</script>
</body>
</html>
