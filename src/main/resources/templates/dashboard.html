<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard - Sistema de Biblioteca</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>

  <main class="main-content">
    <div class="page-header">
      <div class="page-title">
        <h1>Dashboard</h1>
        <p>Visao geral do sistema de biblioteca</p>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-info">
          <small>Usuarios Ativos</small>
          <strong th:text="${usuariosAtivos}">0</strong>
        </div>
        <div class="stat-icon si-blue">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-info">
          <small>Total de Materiais</small>
          <strong th:text="${totalMateriais}">0</strong>
        </div>
        <div class="stat-icon si-green">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          </svg>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-info">
          <small>Emprestimos Ativos</small>
          <strong th:text="${emprestimosAtivos}">0</strong>
        </div>
        <div class="stat-icon si-orange">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/>
          </svg>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-info">
          <small>Reservas Pendentes</small>
          <strong th:text="${reservasPendentes}">0</strong>
        </div>
        <div class="stat-icon si-purple">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- Recent loans -->
    <div class="card">
      <div class="card-header"><span class="card-title">Emprestimos Recentes</span></div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Usuario</th><th>Material</th><th>Data</th><th>Status</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="e : ${emprestimosRecentes}">
              <td th:text="${e.usuario.nome}"></td>
              <td th:text="${e.material.titulo}"></td>
              <td th:text="${#temporals.format(e.dataEmprestimo,'dd/MM/yyyy')}"></td>
              <td><span class="st" th:text="${e.status}"
                th:classappend="${e.status == 'Ativo' ? ' st-ativo' : (e.status == 'Atrasado' ? ' st-atrasado' : ' st-devolvido')}"></span></td>
            </tr>
            <tr th:if="${#lists.isEmpty(emprestimosRecentes)}">
              <td colspan="4" class="empty-row">Nenhum emprestimo encontrado</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>
</body>
</html>
